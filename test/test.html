<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="test.js" defer></script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    #app {
        background: #ffffff;
        padding: 30px 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        max-width: 500px;
        width: 90%;
        animation: fadeIn 0.4s ease;
    }

    #app p {
        margin-bottom: 10px;
        color: #333;
        font-size: 15px;
    }

    #app strong {
        color: #111;
    }

    #app p:last-child {
        background: #f5f5f5;
        padding: 10px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 13px;
        overflow-x: auto;
    }


</style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
