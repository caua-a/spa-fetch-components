    <title>Testando Todos os Alertas do SweetAlert2</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.18.0/dist/sweetalert2.min.css">

    <!-- SweetAlert2 JavaScript via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.18.0/dist/sweetalert2.all.min.js" defer></script>

    <!-- Bootstrap JS via CDN JS -->

        integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"
        defer></script>

    <!-- Script interno para testes da API Sweet -->
    <script src="./sweet.js" defer></script>
</head>

    <div class="container mt-5">
        <h1 class="text-center mb-4">Teste</h1>
        <div class="row">
            <!-- Card 1: Alerta Básico -->
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta Básico</div>
                    <div class="card-body text-center">
                        <button id="alertBasico" class="btn btn-secondary">Exibir Alerta Básico</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta de Sucesso</div>
                    <div class="card-body text-center">
                        <button id="alertSucesso" class="btn btn-success">Exibir Sucesso</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta Erro</div>
                    <div class="card-body text-center">
                        <button id="alertErro" class="btn btn-danger">Exibir Erro</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta Aviso</div>
                    <div class="card-body text-center">
                        <button id="alertAviso" class="btn btn-warning">Exibir Aviso</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta Informativo</div>
                    <div class="card-body text-center">
                        <button id="alertInfo" class="btn btn-info">Exibir Informação</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta Confirmação</div>
                    <div class="card-body text-center">
                        <button id="alertConfirm" class="btn btn-primary">Exibir Confirmação</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta Input</div>
                    <div class="card-body text-center">
                        <button id="alertInput" class="btn btn-dark">Exibir Input</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta Timer</div>
                    <div class="card-body text-center">
                        <button id="alertTimer" class="btn btn-outline-primary">Exibir Timer</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta Timer e Contagem Regressiva</div>
                    <div class="card-body text-center">
                        <button id="alertTimerCount" class="btn btn-outline-primary">Exibir Timer Contagem</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header">Alerta HTML</div>
                    <div class="card-body text-center">
                        <button id="alertHtml" class="btn btn-outline-secondary">Exibir HTML</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
